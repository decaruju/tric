                - paragraph [ref=f4e351]: Dag Tineke,
                - paragraph [ref=f4e352]: Als je de hals 2 recht, 2 averecht breit, brei je 26 keer een herhalend patroon van 4 steken. Vervolgens lopen 2 steken recht van de hals door in de raglanlijnen.
