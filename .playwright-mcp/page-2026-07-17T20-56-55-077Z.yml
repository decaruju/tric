              - generic [ref=f4e296]:
                - paragraph [ref=f4e297]:
                  - strong [ref=f4e298]: "DROPS Design answered:"
                - paragraph [ref=f4e299]: Hi Sarah, There is a size chart at the bottom of the page, with all measurements for the different sizes. Regards, Drops Team.
