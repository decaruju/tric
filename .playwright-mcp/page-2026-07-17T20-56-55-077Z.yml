            - generic [ref=f4e301]:
              - paragraph [ref=f4e302]:
                - img "country flag"
                - strong [ref=f4e303]: "Isabel wrote:"
              - paragraph [ref=f4e304]: Hello! I'm knitting a size M and splitting for sleeves now, and I'm a bit confused. My round starts on the right side of back piece as the pattern suggests, I knit one and separated the the 48 stitches which leaves me mid arm panel. This has made the arms wonky and shift to one side and is not even with the rest of the sweater. Any suggestions on what I'm doing wrong?
              - text: 16.04.2026 - 08:51
              - paragraph
              - generic [ref=f4e306]:
                - paragraph [ref=f4e307]:
                  - strong [ref=f4e308]: "DROPS Design answered:"
                - paragraph [ref=f4e309]: "Dear Isabel, the rounds on yoke started with the raglan stitch at the transition between back piece and right sleeve, and this stitch belongs to back piece, so that you should have for sleeve: 8+8+16+8+8=48 sts and the next stitch before marker thread belongs to front piece. Hope this can help. Happy knitting!"
                - text: 16.04.2026 - 16:35
                - paragraph
            - generic [ref=f4e311]:
