            - generic [ref=f4e374]:
              - paragraph [ref=f4e375]:
                - img "country flag"
                - strong [ref=f4e376]: "Denise wrote:"
              - paragraph [ref=f4e377]: This was a fun pattern to make. I'm not that familiar with website patterns and once I figured out you had videos to show how to add stitches it was great. I plan to make the sweater again. I was surprised that it is a heavy sweater, it looked lighter in the photos. I added a kangaroo pouch to the front. I plan to have this sweater on working in my veggie garden this spring. Thank you for the pattern.
              - text: 26.02.2026 - 16:14
              - paragraph
            - generic [ref=f4e379]:
              - paragraph [ref=f4e380]:
                - img "country flag"
                - strong [ref=f4e381]: "Irene wrote:"
              - paragraph [ref=f4e382]: "Could you please clarify how to measure this: \"the yoke measures approx. 22 cm from the marker mid-front\" Specifically, from the marker mid-front, how do I measure it?"
              - text: 23.02.2026 - 19:20
              - paragraph
              - generic [ref=f4e384]:
                - paragraph [ref=f4e385]:
                  - strong [ref=f4e386]: "DROPS Design answered:"
                - paragraph [ref=f4e387]: "Hi Irene, NECK: ...Insert 1 marker after the first 29-31-31-37-37-39 stitches (approx. mid-front); the piece is now measured from here. This marker should remain at the same place (in a round just after the neck). You will measure yoke lenght from this point (marker) downwards, in a straight line. Happy knitting!"
                - text: 08.04.2026 - 16:06
                - paragraph
