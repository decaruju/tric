                  - strong [ref=f4e361]: "DROPS Design answered:"
                - paragraph [ref=f4e362]: Buonasera Veronica, in quel punto vengono spiegati gli aumenti per il corpo e le maniche, che sono diversi. Per il corpo si aumenta ogni 2 ferri e per le maniche ogni 4 ferri, quindi significa che ogni 2 ferri aumenterà solo 4 maglie e ogni 4 ferri ne aumenterà 8. Buon lavoro!
                - text: 06.03.2026 - 19:28
                - paragraph
            - generic [ref=f4e364]:
              - paragraph [ref=f4e365]:
                - img "country flag"
                - strong [ref=f4e366]: "Veronica wrote:"
              - paragraph [ref=f4e367]: "Vorrei chiedere un chiarimento riguardo gli aumenti del raglan: ogni 2 giri sul davanti e dietro e ogni 4 giri sulle maniche (in modo alternato 4 e 8 aumenti su ogni giro di aumenti)."
              - text: 04.03.2026 - 21:17
              - paragraph
              - generic [ref=f4e369]:
                - paragraph [ref=f4e370]:
                  - strong [ref=f4e371]: "DROPS Design answered:"
                - paragraph [ref=f4e372]: Buonasera Veronica, che tipo di chiarimento necessita? In quel punto vengono spiegati gli aumenti per il raglan, che sono diversi per il corpo e per le maniche. Buon lavoro!
