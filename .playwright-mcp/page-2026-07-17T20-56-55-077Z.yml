                - strong [ref=f4e324]: "Marjo wrote:"
              - paragraph [ref=f4e325]: Ik heb de hals gebreis. Maar ik snap ik het volgende niet. Voeg een markeerdraad in na 37 steken. Dat moet dan midden voor zijn. Waar vanaf tel ik de markeerdraden voor de raglan.
