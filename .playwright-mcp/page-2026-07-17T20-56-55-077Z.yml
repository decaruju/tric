                  - button "Keep the screen on while knitting" [ref=f4e223] [cursor=pointer]
                  - generic [ref=f4e227]:
                    - button "Tools" [ref=f4e229] [cursor=pointer]
                    - generic [ref=f4e232]: "------------------------------------------------------- EXPLANATIONS FOR THE PATTERN: ------------------------------------------------------- RAGLAN: Increase 1 stitch by making 1 yarn over, which is then worked on the next round as follows: BEFORE MARKER-THREAD: Slip the yarn-over off the left needle and replace it twisted (insert the left needle through the back when replacing it). Knit the front loop of the yarn-over to avoid a hole. Then work the new stitch in stocking stitch. AFTER MARKER-THREAD: Knit the yarn-over through the back loop to avoid a hole. Then work the new stitch in stocking stitch. DECREASE TIP: Decrease 1 stitch on each side of the marker-thread as follows: Work until there are 3 stitches left before the marker-thread, knit 2 together, knit 2 (marker-thread sits between these 2 stitches), slip 1 stitch knit-wise, knit 1 and pass the slipped stitch over the knitted stitch (2 stitches decreased). INCREASE TIP-1 (evenly spaced): To work out how to increase evenly, count the total number of stitches on the needle (e.g., 164 stitches) and divide by the number of increases to be made (e.g., 20) = 8.2. In this example, increase by making 1 yarn-over after approx. each 8th stitch. On the next round work the yarn overs twisted to avoid holes. ------------------------------------------------------- START THE PIECE HERE: ------------------------------------------------------- JUMPER – SHORT OVERVIEW OF THE PIECE. The pattern uses both long and short needles; start with the length which fits the number of stitches and change when necessary. The neck and yoke are worked in the round with circular needle, from the right back shoulder, top down. When the yoke is finished, it is divided for the body and sleeves. The body is continued in the round, while the sleeves wait. The sleeves are worked in the round, top down. NECK: Cast on 80-88-88-104-104-112 stitches with circular needle size 5 mm and DROPS Nepal. Change to circular needle size 4 mm (casting on with a larger needle size makes the cast-on edge elastic) and knit 4 rounds. The beginning of the round is the right back shoulder. Work rib in the round (knit 2, purl 2) for 6-6-6-7-7-7 cm. Insert 1 marker after the first 29-31-31-37-37-39 stitches (approx. mid-front); the piece is now measured from here. YOKE: Insert 4 marker-threads, without working the piece and inserting each thread between 2 knitted stitches from the rib (these are raglan-stitches which are continued in stocking stitch). Count 1 stitch and insert 1 marker-thread before the next stitch, count 16-16-16-20-20-20 stitches (= sleeve), insert 1 marker-thread before the next stitch, count 24-28-28-32-32-36 stitches (= front piece), insert 1 marker-thread before the next stitch, count 16-16-16-20-20-20 stitches (= sleeve), insert 1 marker-thread before the next stitch, there are 24-28-28-32-32-36 stitches left (= back piece). Change to circular needle size 5 mm and work stocking stitch in the round. AT THE SAME TIME increase for RAGLAN – read description above, before/after the 2 raglan-stitches by each marker-thread (in each transition between the body and sleeves) every 2nd round a total of 8-8-11-9-7-7 times = 144-152-176-176-160-168 stitches (= 8 increased stitches on each increase-round). Remember to maintain the knitting tension. Then increase for raglan as follows: Every 2nd round on the front and back pieces and every 4th round on the sleeves (= alternately 4 and 8 increased stitches on each increase-round). Repeat these increases a total of 16-16-16-18-24-26 times on the front and back pieces (8-8-8-9-12-13 times on the sleeves). After the last increase there are 240-248-272-284-304-324 stitches and the yoke measures approx. 22-22-25-25-28-30 cm from the marker mid-front. Continue working without further increases until the yoke measures 22-23-25-25-28-30 cm from the marker. Now divide for the body and sleeves. DIVIDE FOR BODY AND SLEEVES: On the next round work as follows: Knit 1 (belongs to the back piece), place the next 48-48-54-56-58-60 stitches on a thread for the sleeve, cast on 10-12-14-18-20-22 stitches (in side mid-under sleeve), knit 72-76-82-86-94-102 (= front piece), place the next 48-48-54-56-58-60 stitches on a thread for the sleeve, cast on 10-12-14-18-20-22 stitches (in side mid-under sleeve), knit the last 71-75-81-85-93-101 stitches (= back piece). The body and sleeves are finished separately and the next round begins under the sleeve. BODY: = 164-176-192-208-228-248 stitches. Insert 1 marker in the middle of the 10-12-14-18-20-22 cast-on stitches under the sleeve. Work to the marker and continue stocking stitch in the round until the piece measures 44-46-48-48-50-52 cm from the marker mid-front. Change to circular needle size 4 mm and work rib (knit 2, purl 2), AT THE SAME TIME increasing 20-20-24-24-28-28 stitches evenly on the first round – read INCREASE TIP = 184-196-216-232-256-276 stitches. When the rib measures 6-6-6-7-7-7 cm, knit 4 rounds, then cast off a little loosely with knit. The jumper measures approx. 51-53-55-56-58-60 cm from the marker mid-front and approx. 56-58-60-62-64-66 cm from top of shoulder. SLEEVES: Place the 48-48-54-56-58-60 sleeve-stitches from the thread on one side of the piece on short circular needle size 5 mm and knit up 1 stitch in each of the 10-12-14-18-20-22 stitches cast on under the sleeve = 58-60-68-74-78-82 stitches. Insert a marker-thread in the middle of the 10-12-14-18-20-22 stitches under the sleeve. Start at the marker-thread and work stocking stitch in the round. When the sleeve measures 3 cm, decrease under the sleeve – read DECREASE TIP. Decrease 2 stitches every 7-7-4-3-2½-2 cm a total of 5-5-8-10-11-12 times = 48-50-52-54-56-58 stitches. Continue working until the sleeve measures 39-39-38-36-34-32 cm from the division. Change to double pointed needles size 4 mm. Work rib (knit 2, purl 2), AT THE SAME TIME increase 4-6-4-6-4-6 stitches evenly on the first round = 52-56-56-60-60-64 stitches. When the rib measures 6-6-6-7-7-7 cm, knit 4 rounds, then cast off a little loosely with knit. The sleeve measures approx. 46-46-45-44-42-40 cm from the division."
