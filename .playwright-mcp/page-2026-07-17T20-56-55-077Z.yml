                    - generic [ref=f4e173]: "DROPS Design: Pattern ne-388 Yarn group C or A + A ------------------------------------------------------- SIZES: S - M - L - XL - XXL - XXXL YARN: DROPS NEPAL from Garnstudio (belongs to yarn group C) 600-650-700-750-800-900 g colour 6790, royal blue NEEDLES: DROPS CIRCULAR NEEDLE SIZE 5 MM: Length 40 cm and 80 cm. DROPS CIRCULAR NEEDLE SIZE 4 MM: Length 40 cm and 80 cm. DROPS DOUBLE POINTED NEEDLES SIZE 5 MM. DROPS DOUBLE POINTED NEEDLES SIZE 4 MM. The technique MAGIC LOOP can be used – you then only need 80 cm circular needle in each size. KNITTING TENSION: 17 stitches in width and 22 rows in height, with stocking stitch and needle size 5 mm = 10 x 10 cm. NOTE: Needle size is only a guide. If you get too many stitches on 10 cm, change to a larger needle size. If you get too few stitches on 10 cm, change to a smaller needle size."
