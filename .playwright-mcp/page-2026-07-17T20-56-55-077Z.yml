            - generic [ref=f4e333]:
              - paragraph [ref=f4e334]:
                - img "country flag"
                - strong [ref=f4e335]: "LAURA wrote:"
              - paragraph [ref=f4e336]: Buongiorno, sono una principiante e vorrei provare questo modello, che mi piace molto. Ho già fatto un maglione simile e mi sono accorta che sarebbe meglio inserire i ferri accorciati per il collo anatomico. Nella spiegazione mi pare non sia previsto. Avete un altro modello simile con collo anatomico? Altrimenti come faccio a inserirlo in questo? Grazie mille
